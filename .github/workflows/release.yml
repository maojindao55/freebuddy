name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "FreeBuddy ${{ github.ref_name }}" \
              --draft \
              --notes "## 下载安装包

          在下方 Assets 中选择对应平台的安装包：
          - macOS (Apple Silicon)：\`*-mac-arm64.dmg\`
          - macOS (Intel)：\`*-mac-x64.dmg\`
          - Windows：\`*-win-x64.exe\`

          应用的「检查更新」会自动从本 Release 拉取最新版本。

          ## macOS 安装提示
          如果提示无法打开，请在终端执行：
          \`\`\`bash
          xattr -cr /Applications/FreeBuddy.app
          \`\`\`

          ## Windows 安装提示
          如果 SmartScreen 弹出警告，点击「更多信息」后选择「仍要运行」。"
          fi

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            builder_args: --mac --arm64 --x64
          - platform: windows-latest
            builder_args: --win --x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder ${{ matrix.builder_args }} --publish always

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --latest
