name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "FreeBuddy ${{ github.ref_name }}" \
              --draft \
              --notes "## 下载安装包

          | 平台 | 文件 | 说明 |
          |------|------|------|
          | macOS Apple Silicon | \`FreeBuddy_macOS-Apple-Silicon-${{ github.ref_name }}.dmg\` | M 系列芯片 Mac |
          | macOS Intel | \`FreeBuddy_macOS-Intel-${{ github.ref_name }}.dmg\` | Intel 芯片 Mac |
          | Windows | \`FreeBuddy_Windows_x64-${{ github.ref_name }}.exe\` | Windows 10/11 64 位 |
          | Ubuntu / Debian (x64) | \`FreeBuddy_Ubuntu_x64-${{ github.ref_name }}.deb\` | Ubuntu 22.04/24.04 及 Debian 系发行版 |
          | Linux AppImage (x64) | \`FreeBuddy_Linux_x64-${{ github.ref_name }}.AppImage\` | 免安装的通用 Linux 包 |

          ## macOS 安装提示
          如果提示无法打开，请在终端执行：
          \`\`\`bash
          xattr -cr /Applications/FreeBuddy.app
          \`\`\`

          ## Windows 安装提示
          如果 SmartScreen 弹出警告，点击「更多信息」后选择「仍要运行」。

          ## Ubuntu / Linux 安装提示
          Ubuntu / Debian 推荐安装 DEB：
          \`\`\`bash
          sudo apt install ./FreeBuddy_Ubuntu_x64-${{ github.ref_name }}.deb
          \`\`\`
          AppImage 下载后可直接授权运行：
          \`\`\`bash
          chmod +x FreeBuddy_Linux_x64-${{ github.ref_name }}.AppImage
          ./FreeBuddy_Linux_x64-${{ github.ref_name }}.AppImage
          \`\`\`"
          fi

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            builder_args: --mac --arm64
            tokscale_platform: darwin
            tokscale_arch: arm64
            assets: |
              FreeBuddy_macOS-Apple-Silicon-__VERSION__.dmg|*.dmg
              FreeBuddy_macOS-Apple-Silicon-__VERSION__.zip|*.zip
          - platform: macos-latest
            builder_args: --mac --x64
            tokscale_platform: darwin
            tokscale_arch: x64
            assets: |
              FreeBuddy_macOS-Intel-__VERSION__.dmg|*.dmg
              FreeBuddy_macOS-Intel-__VERSION__.zip|*.zip
          - platform: windows-latest
            builder_args: --win --x64
            tokscale_platform: win32
            tokscale_arch: x64
            assets: |
              FreeBuddy_Windows_x64-__VERSION__.exe|*.exe
          - platform: ubuntu-latest
            builder_args: --linux --x64
            tokscale_platform: linux
            tokscale_arch: x64
            assets: |
              FreeBuddy_Ubuntu_x64-__VERSION__.deb|*.deb
              FreeBuddy_Linux_x64-__VERSION__.AppImage|*.AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build Electron app
        env:
          FREEBUDDY_POSTHOG_KEY: ${{ secrets.FREEBUDDY_POSTHOG_KEY }}
          FREEBUDDY_POSTHOG_HOST: ${{ vars.FREEBUDDY_POSTHOG_HOST }}
          # macOS code signing (REQUIRED for Squirrel.Mac auto-update to work).
          # Scoped to macOS only: the Apple Development cert cannot sign
          # Windows exes, and feeding the multi-cert .p12 to Windows
          # signtool fails with "Multiple certificates were found".
          CSC_LINK: ${{ matrix.platform == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
        run: |
          node scripts/ensure-tokscale-platform.mjs --platform ${{ matrix.tokscale_platform }} --arch ${{ matrix.tokscale_arch }}
          npm run build
          npx electron-builder ${{ matrix.builder_args }} --publish never

      - name: Upload renamed assets (Unix)
        if: matrix.platform != 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version_suffix="v$(node -p "require('./package.json').version")"
          while IFS='|' read -r asset_name find_pattern; do
            if [ -z "$asset_name" ]; then
              continue
            fi
            asset_name="${asset_name//__VERSION__/$version_suffix}"
            FILE=$(find release -name "$find_pattern" -type f | head -1)
            if [ -z "$FILE" ]; then
              echo "No artifact matching $find_pattern found"
              find release -type f || true
              exit 1
            fi
            cp "$FILE" "$asset_name"
            gh release upload "${{ github.ref_name }}" "$asset_name" \
              --repo "${{ github.repository }}" --clobber
          done <<'ASSETS'
          ${{ matrix.assets }}
          ASSETS

      - name: Upload macOS update metadata (per-arch latest-mac.yml)
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"
          version_suffix="v$(node -p "require('./package.json').version")"
          arm_dmg="FreeBuddy_macOS-Apple-Silicon-${version_suffix}.dmg"
          arm_zip="FreeBuddy_macOS-Apple-Silicon-${version_suffix}.zip"
          x64_dmg="FreeBuddy_macOS-Intel-${version_suffix}.dmg"
          x64_zip="FreeBuddy_macOS-Intel-${version_suffix}.zip"
          yml=$(find release -name latest-mac.yml -type f | head -1)
          if [ -z "$yml" ]; then
            echo "No latest-mac.yml found; skipping"
            exit 0
          fi
          # Rewrite native artifact names to the friendly download names
          # that we actually uploaded above.
          sed -i.bak \
            -e "s#FreeBuddy-[0-9]\{1,\}\.[0-9]\{1,\}\.[0-9]\{1,\}-mac-arm64\.dmg#${arm_dmg}#g" \
            -e "s#FreeBuddy-[0-9]\{1,\}\.[0-9]\{1,\}\.[0-9]\{1,\}-mac-x64\.dmg#${x64_dmg}#g" \
            -e "s#FreeBuddy-[0-9]\{1,\}\.[0-9]\{1,\}\.[0-9]\{1,\}-mac-arm64\.zip#${arm_zip}#g" \
            -e "s#FreeBuddy-[0-9]\{1,\}\.[0-9]\{1,\}\.[0-9]\{1,\}-mac-x64\.zip#${x64_zip}#g" \
            "$yml"
          # Tag the yml with the arch so the two matrix jobs don't clobber
          # each other. A follow-up job merges them into latest-mac.yml.
          if echo "${{ matrix.builder_args }}" | grep -q -- '--arm64'; then
            arch_tag="arm64"
          else
            arch_tag="x64"
          fi
          cp "$yml" "latest-mac-${arch_tag}.yml"
          gh release upload "$tag" "latest-mac-${arch_tag}.yml" \
            --repo "$repo" --clobber
          # Also upload the blockmap so delta updates work.
          dmg_blockmap=$(find release -name "*.dmg.blockmap" -type f | head -1)
          if [ -n "$dmg_blockmap" ]; then
            if [ "$arch_tag" = "arm64" ]; then
              cp "$dmg_blockmap" "${arm_dmg}.blockmap"
              gh release upload "$tag" "${arm_dmg}.blockmap" \
                --repo "$repo" --clobber
            else
              cp "$dmg_blockmap" "${x64_dmg}.blockmap"
              gh release upload "$tag" "${x64_dmg}.blockmap" \
                --repo "$repo" --clobber
            fi
          fi
          zip_blockmap=$(find release -name "*.zip.blockmap" -type f | head -1)
          if [ -n "$zip_blockmap" ]; then
            if [ "$arch_tag" = "arm64" ]; then
              cp "$zip_blockmap" "${arm_zip}.blockmap"
              gh release upload "$tag" "${arm_zip}.blockmap" \
                --repo "$repo" --clobber
            else
              cp "$zip_blockmap" "${x64_zip}.blockmap"
              gh release upload "$tag" "${x64_zip}.blockmap" \
                --repo "$repo" --clobber
            fi
          fi

      - name: Upload Linux update metadata (latest-linux.yml)
        if: matrix.platform == 'ubuntu-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"
          version_suffix="v$(node -p "require('./package.json').version")"
          appimage_name="FreeBuddy_Linux_x64-${version_suffix}.AppImage"
          yml=$(find release -name latest-linux.yml -type f | head -1)
          if [ -z "$yml" ]; then
            echo "No latest-linux.yml found; skipping"
            exit 0
          fi
          # AppImage blockmap data is embedded in the AppImage itself. Rewrite
          # the native artifact name to the friendly download name above.
          sed -E -i.bak \
            "s#FreeBuddy-[0-9]+\.[0-9]+\.[0-9]+-linux-(x64|x86_64)\.AppImage#${appimage_name}#g" \
            "$yml"
          cp "$yml" latest-linux.yml
          gh release upload "$tag" latest-linux.yml \
            --repo "$repo" --clobber

      - name: Upload renamed assets (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $appVersion = (Get-Content package.json | ConvertFrom-Json).version
          $assets = @"
          ${{ matrix.assets }}
          "@ -split "`n"
          foreach ($asset in $assets) {
            if ([string]::IsNullOrWhiteSpace($asset)) {
              continue
            }
            $parts = $asset.Trim().Split("|")
            $assetName = $parts[0]
            $assetName = $assetName.Replace("__VERSION__", "v$appVersion")
            $findPattern = $parts[1]
            $file = Get-ChildItem -Path release -Recurse -Filter $findPattern | Select-Object -First 1
            if (-not $file) {
              Write-Error "No artifact matching $findPattern found"
              Get-ChildItem -Path release -Recurse -File
              exit 1
            }
            Copy-Item $file.FullName $assetName
            gh release upload "${{ github.ref_name }}" $assetName `
              --repo "${{ github.repository }}" --clobber
          }

      - name: Upload Windows update metadata (latest.yml)
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $appVersion = (Get-Content package.json | ConvertFrom-Json).version
          $windowsAssetName = "FreeBuddy_Windows_x64-v$appVersion.exe"
          # electron-updater reads latest.yml to discover newer versions.
          # Rewrite the native artifact name so it points at the friendly
          # download name uploaded above.
          $yml = Get-ChildItem -Path release -Recurse -Filter latest.yml | Select-Object -First 1
          if (-not $yml) {
            Write-Host "No latest.yml found; skipping update metadata upload"
            exit 0
          }
          $content = Get-Content $yml.FullName -Raw
          $content = $content -replace 'FreeBuddy-[0-9]+\.[0-9]+\.[0-9]+-win-x64\.exe', $windowsAssetName
          Set-Content -Path latest.yml -Value $content -NoNewline
          gh release upload $tag latest.yml --repo $repo --clobber
          $blockmap = Get-ChildItem -Path release -Recurse -Filter *.exe.blockmap | Select-Object -First 1
          if ($blockmap) {
            Copy-Item $blockmap.FullName "$windowsAssetName.blockmap"
            gh release upload $tag "$windowsAssetName.blockmap" --repo $repo --clobber
          }

  merge-mac-metadata:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Merge per-arch latest-mac.yml into latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"
          mkdir -p _mac_meta
          gh release download "$tag" --repo "$repo" \
            --dir _mac_meta \
            --pattern 'latest-mac-arm64.yml' \
            --pattern 'latest-mac-x64.yml' || true
          if [ ! -f _mac_meta/latest-mac-arm64.yml ] && [ ! -f _mac_meta/latest-mac-x64.yml ]; then
            echo "No per-arch mac yml found; skipping merge"
            exit 0
          fi
          node scripts/merge-mac-latest-yml.mjs \
            _mac_meta/latest-mac-arm64.yml \
            _mac_meta/latest-mac-x64.yml \
            latest-mac.yml
          gh release upload "$tag" latest-mac.yml --repo "$repo" --clobber

  publish-release:
    needs: merge-mac-metadata
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --latest
