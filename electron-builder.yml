appId: dev.freebuddy.app
productName: FreeBuddy
copyright: Copyright © 2026 FreeBuddy
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - assets/app-icon.png
  - package.json

extraResources:
  - from: assets/app-icon.png
    to: app-icon.png

asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/node-pty/**/*

publish:
  - provider: github
    owner: maojindao55
    repo: freebuddy

# Use the static AppImage runtime so Ubuntu 24.04 users do not need FUSE 2.
toolsets:
  appimage: "1.0.3"

mac:
  icon: desktop/macos/AppIcon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: desktop/macos/entitlements.mac.plist
  entitlementsInherit: desktop/macos/entitlements.mac.inherit.plist
  target:
    - target: dmg
    - target: zip

win:
  icon: assets/app-icon.ico
  target:
    - target: nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

linux:
  icon: assets/app-icon.png
  category: Utility
  maintainer: FreeBuddy <noreply@freebuddy.dev>
  target:
    - target: AppImage
    - target: deb
